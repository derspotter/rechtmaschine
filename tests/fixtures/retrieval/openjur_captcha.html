    <style>
input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  background: transparent;
  cursor: pointer;
}

input[type="range"]:focus {
  outline: none;
}

input[type="range"]::-webkit-slider-runnable-track {
  background-color: #bcc4cd;
  border-radius: 0.5rem;
  height: 1rem;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  margin-top: -12px;
  border-radius: 0.5rem;
  height: 2.5rem;
  width: 2rem;
}

input[type="range"]:focus::-webkit-slider-thumb {
  outline: 3px solid #0d6efd;
  outline-offset: 0.125rem;
}

input[type="range"]::-moz-range-track {
  background-color: #bcc4cd;
  border-radius: 0.5rem;
  height: 1rem;
}

input[type="range"]::-moz-range-thumb {
  background-color: #0d6efd;
  border: none;
  border-radius: 0.5rem;
  height: 2.5rem;
  width: 2rem;
}

input[type="range"]:focus::-moz-range-thumb{
  outline: 3px solid #0d6efd;
  outline-offset: 0.125rem;
}
    </style>
</head>

<body>
    <main>
        <div class="container">

                        </div>

    <script nonce="38c9ce950d4461d95a48baaef69a111c">
     document.getElementById("aimg").addEventListener("input", function (e) {
        document.getElementById("testImage").style.transform = `rotate(${this.value}deg)`;
