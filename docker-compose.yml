services:
  postgres:
    image: postgres:alpine
    container_name: rechtmaschine-postgres
    restart: unless-stopped
    env_file:
      - app/.env
    environment:
      POSTGRES_USER: rechtmaschine
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: rechtmaschine_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rechtmaschine"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: rechtmaschine-app
    restart: unless-stopped
    env_file:
      - app/.env
    expose:
      # Only expose the app to other containers on the Docker network; public access goes through Caddy.
      - "8000"
    networks:
      - default
      - proxy-rechtmaschine
    volumes:
      - ./app:/app:delegated
      - ./anon:/app/anon:ro
      - downloaded_sources:/app/downloaded_sources
      - uploads_data:/app/uploads
      - /home/jay/.ssh/id_ed25519:/root/.ssh/id_ed25519:ro
      - /home/jay/.ssh/known_hosts:/root/.ssh/known_hosts:ro
    depends_on:
      postgres:
        condition: service_healthy

  job-worker:
    build: .
    container_name: rechtmaschine-job-worker
    restart: unless-stopped
    command: ["python", "/app/job_worker.py"]
    env_file:
      - app/.env
    volumes:
      - ./app:/app:delegated
      - ./anon:/app/anon:ro
      - downloaded_sources:/app/downloaded_sources
      - uploads_data:/app/uploads
      - /home/jay/.ssh/id_ed25519:/root/.ssh/id_ed25519:ro
      - /home/jay/.ssh/known_hosts:/root/.ssh/known_hosts:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  downloaded_sources:
  uploads_data:
  postgres_data:

networks:
  proxy-rechtmaschine:
    external: true
