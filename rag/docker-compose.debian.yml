services:
  rag-postgres:
    image: pgvector/pgvector:pg16
    container_name: rechtmaschine-rag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${RAG_POSTGRES_DB:-rechtmaschine_rag}
      POSTGRES_USER: ${RAG_POSTGRES_USER:-rechtmaschine}
      POSTGRES_PASSWORD: ${RAG_POSTGRES_PASSWORD:?set RAG_POSTGRES_PASSWORD in rag/.env.debian}
    ports:
      - "127.0.0.1:${RAG_POSTGRES_PORT:-5433}:5432"
    volumes:
      - rag-postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/001-init-rag.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12

  rag-embed:
    image: ${RAG_BGE_M3_IMAGE:-ghcr.io/huggingface/text-embeddings-inference:1.7}
    container_name: rechtmaschine-rag-embed
    restart: unless-stopped
    gpus: all
    command:
      - --model-id
      - ${RAG_EMBED_MODEL:-BAAI/bge-m3}
      - --pooling
      - cls
      - --dtype
      - float16
      - --max-batch-tokens
      - "${RAG_EMBED_MAX_BATCH:-4096}"
    ports:
      - "127.0.0.1:${RAG_EMBED_PORT:-8085}:80"
    volumes:
      - ${HF_HOME:-/home/justus/.cache/huggingface}:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 60

  rag-rerank:
    image: ${RAG_BGE_RERANK_IMAGE:-ghcr.io/huggingface/text-embeddings-inference:1.7}
    container_name: rechtmaschine-rag-rerank
    restart: unless-stopped
    gpus: all
    command:
      - --model-id
      - ${RAG_RERANK_MODEL:-BAAI/bge-reranker-v2-m3}
    ports:
      - "127.0.0.1:${RAG_RERANK_PORT:-8086}:80"
    volumes:
      - ${HF_HOME:-/home/justus/.cache/huggingface}:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 60

  gemma:
    # Gemma 4 12B (QAT-Q4) llama-server — controlled-vocabulary tagger for RAG
    # ingestion. Bound to 0.0.0.0 so the app reaches it over Tailscale
    # (GEMMA_TAGGER_URL=http://debian:8011). Co-resident with the TEI stack on
    # the 3060: ~7 GB (c8192/np2, q4_0 KV) alongside TEI's ~3 GB and on-demand OCR.
    image: ${LLAMACPP_IMAGE:-ghcr.io/ggml-org/llama.cpp@sha256:841b199aed2649a748875b043b32fed2e8c2d4d87e1d563556817fb7fa44b72b}
    container_name: gemma-tagger
    restart: unless-stopped
    gpus: all
    command:
      - -m
      - /models/${GEMMA_MODEL_FILE:-gemma-4-12B-it-qat-UD-Q4_K_XL.gguf}
      - -ngl
      - "99"
      - -c
      - "${GEMMA_CTX:-16384}"
      - -np
      - "${GEMMA_PARALLEL:-2}"
      - -ctk
      - q4_0
      - -ctv
      - q4_0
      - -fa
      - "on"
      # VRAM squeeze: smaller prefill compute buffer + quantized draft KV cache
      # (draft defaults to f16), to leave room for the OCR inference spike.
      - -ub
      - "${GEMMA_UBATCH:-256}"
      - -ctkd
      - q8_0
      - -ctvd
      - q8_0
      # MTP speculative decoding: the matched Q4_0 drafter predicts a few tokens
      # that the full model verifies in one pass — ~1.4-2x faster generation,
      # lossless. ~0.25 GB extra VRAM.
      - --model-draft
      - /models/${GEMMA_MTP_FILE:-gemma-4-12B-it-Q4_0-MTP.gguf}
      - --spec-type
      - draft-mtp
      - --spec-draft-n-max
      - "${GEMMA_SPEC_N:-4}"
      # Require an API key: this endpoint is published cross-machine (like
      # rag-api), so it must not be an open inference endpoint. App sends it via
      # GEMMA_TAGGER_API_KEY (must equal GEMMA_API_KEY here). --host stays 0.0.0.0
      # because Docker bridge port-publish forwards to the container's interface,
      # not its loopback.
      - --api-key
      - ${GEMMA_API_KEY:?set GEMMA_API_KEY in rag/.env.debian}
      - --host
      - 0.0.0.0
      - --port
      - "8011"
    ports:
      - "${GEMMA_HOST:-0.0.0.0}:${GEMMA_PORT:-8011}:8011"
    volumes:
      - ${GEMMA_MODELS_DIR:-/home/justus/models}:/models
    healthcheck:
      # Image default probes :8080; we serve on 8011. start_period covers model load.
      test: ["CMD", "curl", "-fsS", "http://localhost:8011/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

  rag-api:
    build:
      context: ..
      dockerfile: rag/api/Dockerfile
    container_name: rechtmaschine-rag-api
    restart: unless-stopped
    depends_on:
      rag-postgres:
        condition: service_healthy
      rag-embed:
        condition: service_healthy
    environment:
      RAG_DATABASE_URL: postgresql://${RAG_POSTGRES_USER:-rechtmaschine}:${RAG_POSTGRES_PASSWORD}@rag-postgres:5432/${RAG_POSTGRES_DB:-rechtmaschine_rag}
      RAG_SERVICE_API_KEY: ${RAG_SERVICE_API_KEY:-}
      RAG_EMBED_URL: http://rag-embed/embed
      RAG_RERANK_URL: http://rag-rerank/rerank
      RAG_EMBED_MODEL: ${RAG_EMBED_MODEL:-BAAI/bge-m3}
      RAG_RERANK_MODEL: ${RAG_RERANK_MODEL:-BAAI/bge-reranker-v2-m3}
      DESKTOP_QWEN_URL: ${DESKTOP_QWEN_URL:-http://desktop:8004}
      OCR_SERVICE_URL: ${OCR_SERVICE_URL:-http://host.docker.internal:8004}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${RAG_API_HOST:-0.0.0.0}:${RAG_API_PORT:-8090}:8090"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8090/v1/rag/health"]
      interval: 15s
      timeout: 5s
      retries: 20

volumes:
  rag-postgres-data:
